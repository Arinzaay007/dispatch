name: Dispatch Daily Run

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    name: Run Dispatch Agent
    runs-on: ubuntu-latest
    steps:
      - name: Trigger agent
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300 \
            ${{ secrets.APP_URL }}/api/cron/run

  send-email:
    name: Send Email Digest
    runs-on: ubuntu-latest
    needs: run-agent
    steps:
      - name: Send digest
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120 \
            ${{ secrets.APP_URL }}/api/email